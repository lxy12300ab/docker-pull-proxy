name: Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      name:
        description: '同步镜像'
        required: true
        default: '同步镜像'

env:
  REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"
  MM_NOTIFY_URL: "${{ secrets.MM_NOTIFY_URL }}"

jobs:
  build:
    name: Pull
    runs-on: ubuntu-latest
    steps:
      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Check out code
        uses: actions/checkout@v4

      - name: Build and push image to ACR EE
        run: |
          docker login -u $ALIYUN_REGISTRY_USER -p $ALIYUN_REGISTRY_PASSWORD $REGISTRY
          bash pull.sh
          data=$(cat trigger.txt)

          if [ -n "$MM_NOTIFY_URL" ]; then
            curl -H 'Content-Type: application/json' \
              -d "{\"msgtype\": \"text\",\"text\": {\"content\":\"同步成功 $data\"}}" \
              "$MM_NOTIFY_URL"
          else
            echo 'MM_NOTIFY_URL not set'
          fi
